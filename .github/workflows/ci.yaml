name: "CI"

on:
  pull_request:
    paths:
      - '**.nix'
      - 'flake.lock'
  push:
    branches: [ master ]
    paths:
      - '**.nix'
      - 'flake.lock'

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: ossystems/nix-actions@v1
        with:
          checks: true
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
