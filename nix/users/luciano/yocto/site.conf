SCONF_VERSION = "1"

DL_DIR = "/srv/yocto/download-cache"
SSTATE_DIR = "/srv/yocto/sstate-cache"

# Interactive tasks (menuconfig/devshell) run inside the bwrap/nix sandbox via a
# dedicated in-sandbox tmux server (the native tmux/nsenter routes cannot work:
# the tmux server runs outside the sandbox and its unprivileged user namespace
# cannot be joined). The wrapper prints the exact tmux attach command.
OE_TERMINAL = "custom"
OE_TERMINAL_CUSTOMCMD = "${HOME}/.yocto/oe-nix-terminal {command}"
